<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informes 2026 · Cáscara Collective</title>

<link rel="stylesheet" href="ds/tokens/fonts.css">
<link rel="stylesheet" href="ds/tokens/colors.css">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  :root{ --ink:var(--cc-ink); --blue:var(--cc-blue); --tiza:var(--cc-cream); --muted:var(--cc-ink-muted); --line:var(--cc-line); }
  html{ scroll-behavior:smooth; }
  /* nada de scroll lateral: el contenido nunca se desborda a los costados */
  html, body{ overflow-x:hidden; overscroll-behavior-x:none; }
  body{ background:var(--tiza); color:var(--ink); font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing:antialiased; padding:72px clamp(28px,6vw,120px) 100px; max-width:100%; }
  .em{ font-family:"Redaction", Georgia, serif; font-style:italic; font-weight:400; }
  .num{ font-variant-numeric:tabular-nums; }
  .wrap{ max-width:1320px; margin:0 auto; }

  header{ display:flex; justify-content:space-between; align-items:flex-start; gap:30px; margin-bottom:18px; }
  .kicker{ display:flex; align-items:center; gap:16px; font-size:18px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--blue); }
  .kicker::before{ content:""; width:28px; height:3px; background:var(--blue); }
  header img{ height:62px; }
  h1{ font-size:clamp(54px,8vw,104px); font-weight:700; letter-spacing:-0.02em; line-height:.98; margin-top:22px; }
  .lede{ font-size:clamp(19px,2.2vw,26px); color:var(--muted); max-width:820px; line-height:1.45; margin-top:22px; }
  .lede b{ color:var(--ink); font-weight:700; }

  /* hero summary band */
  .band{ display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:18px; margin-top:44px; }
  .band__cell{ background:var(--cc-cream-soft); border:1px solid var(--line); border-radius:16px; padding:26px 30px; }
  .band__cell.key{ background:var(--blue); color:#fff; border-color:var(--blue); }
  .band__l{ font-size:14px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); }
  .band__cell.key .band__l{ color:rgba(255,255,255,.75); }
  .band__v{ font-family:"Redaction", Georgia, serif; font-style:italic; font-size:42px; line-height:1; margin-top:10px; font-variant-numeric:tabular-nums; }
  .band__cell.key .band__v{ color:#fff; }
  .band__cell:not(.key) .band__v{ color:var(--blue); }
  .band__s{ font-size:15px; color:var(--muted); margin-top:8px; line-height:1.35; }
  .band__cell.key .band__s{ color:rgba(255,255,255,.78); }

  /* ===== Franja en vivo · Caja a hoy ===== */
  .live{ margin-top:40px; background:var(--ink); color:#fff; border-radius:18px;
    padding:30px clamp(28px,4vw,44px); display:grid; grid-template-columns:1fr auto;
    align-items:center; gap:30px 44px; }
  .live__main{ min-width:0; }
  .live__kick{ display:flex; align-items:center; gap:11px; font-size:13px; font-weight:700;
    text-transform:uppercase; letter-spacing:.14em; color:var(--cc-blue-lt); }
  .live__dot{ width:9px; height:9px; border-radius:50%; background:var(--cc-blue-soft);
    box-shadow:0 0 0 0 rgba(107,122,255,.55); animation:livepulse 2.4s ease-out infinite; flex:0 0 auto; }
  @keyframes livepulse{ 0%{ box-shadow:0 0 0 0 rgba(107,122,255,.5);} 70%{ box-shadow:0 0 0 10px rgba(107,122,255,0);} 100%{ box-shadow:0 0 0 0 rgba(107,122,255,0);} }
  @media (prefers-reduced-motion:reduce){ .live__dot{ animation:none; } }
  .live__l{ font-size:18px; color:rgba(255,255,255,.78); margin-top:16px; }
  .live__v{ font-family:"Redaction",Georgia,serif; font-style:italic; font-size:clamp(52px,7vw,78px);
    line-height:.92; margin-top:6px; color:#fff; font-variant-numeric:tabular-nums; }
  .live__upd{ font-size:15px; color:rgba(255,255,255,.6); margin-top:16px; line-height:1.45; }
  .live__upd b{ color:#fff; font-weight:700; }
  .live__upd .em{ color:var(--cc-blue-lt); }
  .live__cta{ display:flex; flex-direction:column; align-items:flex-end; gap:12px; flex:0 0 auto; }
  .live__btn{ display:inline-flex; align-items:center; gap:10px; text-decoration:none;
    background:var(--cc-blue); color:#fff; font-size:18px; font-weight:700; letter-spacing:.005em;
    padding:16px 28px; border-radius:999px; white-space:nowrap;
    transition:background .18s cubic-bezier(.2,.8,.2,1), transform .12s; }
  .live__btn:hover{ background:var(--cc-blue-electric); }
  .live__btn:active{ background:var(--cc-blue-deep); transform:scale(.97); }
  .live__btn .ar{ font-family:"Redaction",Georgia,serif; font-style:italic; font-size:22px; line-height:1; }
  .live__hint{ font-size:13px; color:rgba(255,255,255,.5); text-align:right; max-width:200px; line-height:1.4; }
  @media (max-width:760px){
    .live{ grid-template-columns:1fr; gap:24px; }
    .live__cta{ align-items:flex-start; }
    .live__hint{ text-align:left; }
    .live__btn{ width:100%; justify-content:center; }
  }

  /* ===== Dashboard ===== */
  .dash{ margin-top:24px; }
  .dashnote{ font-size:15px; color:var(--muted); line-height:1.5; margin-top:14px; padding:14px 18px; background:var(--cc-cream-soft); border:1px solid var(--line); border-radius:12px; }
  .dashnote b{ color:var(--ink); }
  .kpis{ display:grid; grid-template-columns:repeat(4,1fr); gap:18px; }
  .kpi{ background:var(--cc-cream-soft); border:1px solid var(--line); border-radius:16px; padding:26px 28px; display:flex; flex-direction:column; }
  .kpi.key{ box-shadow:0 0 0 1.5px var(--cc-blue); border-color:transparent; }
  .kpi__l{ font-size:14px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); }
  .kpi__v{ font-family:"Redaction",Georgia,serif; font-style:italic; font-size:46px; line-height:1; margin-top:12px; color:var(--cc-blue); font-variant-numeric:tabular-nums; }
  .kpi__s{ font-size:14px; color:var(--muted); margin-top:auto; padding-top:10px; line-height:1.35; }
  .kpi__s b{ color:var(--ink); }

  .charts{ display:flex; flex-direction:column; gap:18px; margin-top:18px; }
  .twodonuts{ display:grid; grid-template-columns:1fr 1fr; gap:36px; }
  .dblock{ min-width:0; }
  .chartcard{ background:var(--cc-cream-soft); border:1px solid var(--line); border-radius:16px; padding:28px 32px; }
  .chartcard.full{ grid-column:1 / -1; }
  .chartcard__t{ font-size:15px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--ink); }
  .chartcard__sub{ font-size:14px; color:var(--muted); margin-top:4px; }

  .donutwrap{ display:flex; flex-direction:column; align-items:center; gap:22px; margin-top:22px; }
  .donut{ width:168px; height:168px; border-radius:50%; flex:0 0 auto; position:relative; }
  .donut::after{ content:""; position:absolute; inset:34px; background:var(--cc-cream-soft); border-radius:50%; }
  .donut__c{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1; }
  .donut__c b{ font-family:"Redaction",Georgia,serif; font-style:italic; font-size:25px; color:var(--cc-blue); line-height:1; white-space:nowrap; }
  .donut__c span{ font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-top:4px; }
  .legend2{ display:flex; flex-direction:column; gap:13px; width:100%; }
  .lg{ display:flex; align-items:baseline; gap:11px; font-size:17px; line-height:1.25; }
  .lg .dot{ width:14px; height:14px; border-radius:4px; flex:0 0 auto; position:relative; top:2px; }
  .lg .nm{ flex:1; }
  .lg .pc{ font-weight:700; font-variant-numeric:tabular-nums; }
  .lg .amt{ color:var(--muted); font-size:14px; font-variant-numeric:tabular-nums; }

  .barsmini{ display:flex; align-items:flex-end; gap:18px; height:170px; margin-top:24px; border-bottom:2px solid var(--ink); }
  .bm{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; }
  .bm__v{ font-size:15px; font-weight:700; margin-bottom:8px; font-variant-numeric:tabular-nums; }
  .bm__bar{ width:100%; max-width:90px; background:var(--cc-blue); border-radius:6px 6px 0 0; }
  .bm__pair{ display:flex; gap:9px; align-items:flex-end; justify-content:center; height:100%; }
  .b-fact{ width:34px; background:var(--cc-blue); border-radius:5px 5px 0 0; }
  .b-cob{ width:34px; background:transparent; border:2px solid var(--cc-ink); border-bottom:none; border-radius:5px 5px 0 0; }
  .legend-row{ display:flex; gap:26px; margin-top:14px; font-size:14px; color:var(--muted); font-weight:500; }
  .legend-row i{ display:inline-block; width:14px; height:14px; border-radius:4px; margin-right:8px; vertical-align:middle; }
  .legend-row .sw-fact{ background:var(--cc-blue); }
  .legend-row .sw-cob{ background:transparent; border:2px solid var(--cc-ink); }
  .bm__cap{ display:flex; justify-content:space-between; gap:18px; margin-top:12px; }
  .bm__m{ flex:1; text-align:center; font-size:15px; color:var(--muted); }
  .chartcard__foot{ font-size:14px; color:var(--muted); margin-top:14px; line-height:1.4; }
  /* lista de montos facturados — sólo teléfono (en desktop van sobre las barras) */
  .bml{ display:none; }
  .bml__h{ font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:6px; }
  .bml__row{ display:flex; justify-content:space-between; align-items:baseline; gap:14px; padding:9px 0; border-bottom:1px solid var(--line); }
  .bml__row:last-child{ border-bottom:none; }
  .bml__m{ font-size:15px; color:var(--ink); }
  .bml__v{ font-size:16px; font-weight:700; font-variant-numeric:tabular-nums; color:var(--cc-blue); }

  @media (max-width:1100px){ .kpis{ grid-template-columns:1fr 1fr; } }
  @media (max-width:620px){ .twodonuts{ grid-template-columns:1fr; } }
  @media (max-width:560px){ .kpis{ grid-template-columns:1fr; } }

  /* ===== Teléfono: que nada empuje el ancho a los costados ===== */
  @media (max-width:620px){
    /* header en columna: el wordmark arriba (sin apretarse contra el borde)
       y el kicker + título debajo, a todo el ancho */
    header{ flex-direction:column-reverse; align-items:flex-start; gap:16px; margin-bottom:14px; }
    header img{ height:34px; flex:0 0 auto; }
    .kicker{ font-size:14px; gap:12px; }
    .kicker::before{ width:20px; }
    h1{ font-size:clamp(44px,14vw,64px); }
    .charts{ min-width:0; }
    .chartcard{ padding:24px 20px; min-width:0; overflow:hidden; }
    /* barras facturado/cobrado: comparación visual, encajan siempre.
       Los montos exactos viven en los KPIs/donas y en la nota, así que
       en teléfono ocultamos las etiquetas por columna (se amontonaban). */
    .barsmini{ gap:10px; height:150px; }
    .bm{ min-width:0; }
    .bm__v{ display:none; }
    .bm__pair{ gap:6px; }
    .b-fact, .b-cob{ width:22px; }
    .bm__cap{ gap:10px; }
    .bm__m{ font-size:14px; min-width:0; }
    .legend-row{ gap:18px; }
    .bml{ display:block; margin-top:18px; }
  }
  @media (max-width:380px){
    .b-fact, .b-cob{ width:18px; }
    .bm__m{ font-size:13px; }
  }

  .section-label{ font-size:17px; font-weight:700; text-transform:uppercase; letter-spacing:.13em; color:var(--muted);
    margin:64px 0 22px; padding-bottom:14px; border-bottom:1px solid var(--line); }

  .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:22px; }
  .card{ display:flex; flex-direction:column; text-decoration:none; color:inherit; position:relative;
    background:var(--cc-cream-soft); border:1px solid var(--line); border-radius:18px; padding:34px 36px 30px;
    transition:transform .18s cubic-bezier(.2,.8,.2,1), box-shadow .18s, background .18s; min-height:248px; }
  a.card:hover{ transform:translateY(-4px); box-shadow:0 6px 22px rgba(10,10,12,.10); }
  .card__no{ font-family:"Redaction", Georgia, serif; font-style:italic; font-size:28px; color:var(--blue); }
  .card__month{ font-size:42px; font-weight:700; letter-spacing:-.01em; margin-top:6px; }
  .card__head{ font-size:21px; color:var(--muted); line-height:1.35; margin-top:10px; flex:1; padding-right:34px; }
  .card__res{ display:flex; gap:12px; margin-top:22px; padding-top:20px; border-top:1px solid var(--line); }
  .card__res div{ flex:1; min-width:0; }
  .card__res div span{ font-size:14px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); display:block; }
  .card__res div b{ font-size:21px; font-weight:700; font-variant-numeric:tabular-nums; letter-spacing:-.015em; white-space:nowrap; display:block; margin-top:3px; }
  .pos{ color:var(--blue); } .neg{ color:var(--ink); opacity:.55; }
  .arrow{ position:absolute; top:34px; right:34px; font-family:"Redaction",Georgia,serif; font-style:italic; font-size:30px; color:var(--blue); line-height:1; }

  /* summary cards = blue / ink */
  .card.sum{ background:var(--blue); color:#fff; border-color:var(--blue); }
  .card.sum .card__no{ color:#fff; }
  .card.sum .card__head{ color:rgba(255,255,255,.82); }
  .card.sum .card__res{ border-top-color:rgba(255,255,255,.24); }
  .card.sum .card__res div span{ color:rgba(255,255,255,.7); }
  .card.sum .pos{ color:#fff; }
  .card.sum .arrow{ color:#fff; }
  .card.sum.ink{ background:var(--ink); border-color:var(--ink); }

  /* disabled / upcoming */
  .card.soon{ opacity:.55; border-style:dashed; cursor:default; }
  .card.soon .card__no{ color:var(--muted); }
  .soon__tag{ display:inline-block; width:fit-content; border:1.5px solid var(--muted); color:var(--muted); border-radius:999px;
    padding:4px 14px; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; margin-top:22px; }

  footer{ margin-top:70px; font-size:17px; color:var(--muted); line-height:1.5; }
  footer b{ color:var(--ink); }
</style>
</head>
<body>
<div class="wrap" id="home"></div>

<script src="js/app.js"></script>
<script src="js/home.js"></script>
</body>
</html>
